<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SnowTelco | Customer Intelligence Command Center</title>
  <script>
    // GitHub Pages SPA redirect (Rafael Pedicini's technique).
    // Translates the not-found URL into a query string the index.html
    // bootstrap can decode and replace into history before React mounts.
    // pathSegmentsToKeep = 1  ⇒ preserves the /<repo>/ project base.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  Redirecting…
</body>
</html>
